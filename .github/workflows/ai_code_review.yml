name: AI Code Review

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit SHA for the review range
        required: true
      head_sha:
        description: Head commit SHA for the review range
        required: true

permissions:
  contents: read

concurrency:
  group: ai-code-review-${{ github.event.after || github.event.inputs.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reviewed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.after || github.event.inputs.head_sha || github.sha }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install review dependencies
        run: python -m pip install requests==2.32.3

      - name: Validate OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing GitHub Actions secret OPENAI_API_KEY."
            exit 1
          fi

      - name: Run AI code review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.4-mini' }}
          AI_REVIEW_BASE_SHA: ${{ github.event.before || github.event.inputs.base_sha }}
          AI_REVIEW_HEAD_SHA: ${{ github.event.after || github.event.inputs.head_sha || github.sha }}
          AI_REVIEW_MAX_DIFF_CHARS: ${{ vars.AI_REVIEW_MAX_DIFF_CHARS || '120000' }}
          AI_REVIEW_MAX_CONTEXT_CHARS: ${{ vars.AI_REVIEW_MAX_CONTEXT_CHARS || '24000' }}
          AI_REVIEW_MAX_OUTPUT_TOKENS: ${{ vars.AI_REVIEW_MAX_OUTPUT_TOKENS || '4000' }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          AI_REVIEW_FEISHU_CHAT_ID: ${{ vars.AI_REVIEW_FEISHU_CHAT_ID || secrets.AI_REVIEW_FEISHU_CHAT_ID }}
        run: python scripts/ai_code_review.py
