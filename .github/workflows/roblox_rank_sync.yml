name: Roblox Rank Sync

on:
  schedule:
    - cron: "40 1 * * *"
  workflow_dispatch:
    inputs:
      report_mode:
        description: Runtime report mode
        required: false
        default: top100_message
      trigger_source:
        description: Trigger source label shown in Feishu notification
        required: false
        default: manual
      trigger_actor:
        description: Trigger actor label shown in Feishu notification
        required: false
        default: ""
      chat_id:
        description: Feishu chat id to receive the final result
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      RUN_REPORT_MODE: ${{ github.event_name == 'schedule' && 'top_trending_sheet' || github.event.inputs.report_mode || 'top100_message' }}
      RUN_TRIGGER_SOURCE: ${{ github.event_name == 'schedule' && 'schedule' || github.event.inputs.trigger_source || github.event_name }}
      RUN_TRIGGER_ACTOR: ${{ github.event.inputs.trigger_actor || github.actor }}
      RUN_CHAT_ID: ${{ github.event_name == 'schedule' && vars.FEISHU_SCHEDULE_CHAT_ID || github.event.inputs.chat_id || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run sync
        env:
          OUTPUT_DIR: ./data
          RETRY_MAX_ATTEMPTS: 3
          RETRY_BACKOFF_SECONDS: 2
          REQUEST_TIMEOUT_SECONDS: 15
          API_LIMIT: 100
          ROBLOX_SORT_ID: top-playing-now
          ROBLOX_TOP_TRENDING_SORT_ID: Top_Trending_V4
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_TIMEZONE: Asia/Shanghai
          FEISHU_TOP_TRENDING_SPREADSHEET_TOKEN: ${{ vars.FEISHU_TOP_TRENDING_SPREADSHEET_TOKEN }}
          FEISHU_TOP_TRENDING_SHEET_ID: ${{ vars.FEISHU_TOP_TRENDING_SHEET_ID }}
          FEISHU_UP_AND_COMING_SHEET_ID: ${{ vars.FEISHU_UP_AND_COMING_SHEET_ID }}
          FEISHU_CCU_BASED_SHEET_ID: ${{ vars.FEISHU_CCU_BASED_SHEET_ID }}
          FEISHU_TOP_PLAYING_NOW_SHEET_ID: ${{ vars.FEISHU_TOP_PLAYING_NOW_SHEET_ID }}
          FEISHU_TOP_TRENDING_PREV_RANKS: ${{ vars.FEISHU_TOP_TRENDING_PREV_RANKS }}
          FEISHU_UP_AND_COMING_PREV_RANKS: ${{ vars.FEISHU_UP_AND_COMING_PREV_RANKS }}
          FEISHU_CCU_BASED_PREV_RANKS: ${{ vars.FEISHU_CCU_BASED_PREV_RANKS }}
          FEISHU_TOP_PLAYING_NOW_PREV_RANKS: ${{ vars.FEISHU_TOP_PLAYING_NOW_PREV_RANKS }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          GITHUB_VARIABLES_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_REPORT_MODE: ${{ env.RUN_REPORT_MODE }}
          RUN_TRIGGER_SOURCE: ${{ env.RUN_TRIGGER_SOURCE }}
          RUN_TRIGGER_ACTOR: ${{ env.RUN_TRIGGER_ACTOR }}
          RUN_CHAT_ID: ${{ env.RUN_CHAT_ID }}
        run: python -m app.main

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roblox-top100-data
          path: data/
