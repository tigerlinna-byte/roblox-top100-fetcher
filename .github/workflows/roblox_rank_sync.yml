name: Roblox Rank Sync

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: Runtime report mode
        required: false
        default: top100_message
      trigger_source:
        description: Trigger source label shown in Feishu notification
        required: false
        default: manual
      trigger_actor:
        description: Trigger actor label shown in Feishu notification
        required: false
        default: ""
      chat_id:
        description: Feishu chat id to receive the final result
        required: false
        default: ""

jobs:
  probe:
    if: ${{ github.event.inputs.report_mode == 'creator_metrics_probe' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Capture HTML and network payloads
        env:
          ROBLOX_CREATOR_COOKIE: ${{ secrets.ROBLOX_CREATOR_COOKIE }}
          ROBLOX_CREATOR_OVERVIEW_URL: ${{ vars.ROBLOX_CREATOR_OVERVIEW_URL }}
          ROBLOX_CREATOR_OVERVIEW_URL_2: ${{ vars.ROBLOX_CREATOR_OVERVIEW_URL_2 }}
        run: |
          set -euo pipefail
          mkdir -p probe
          export PROBE_DIR="$PWD/probe"
          python - <<'PY'
          import html
          import json
          import os
          from pathlib import Path
          import requests

          KEYWORDS = ("percentile", "benchmark", "peer", "retention", "payer", "arppu", "session", "duration")
          headers = {
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                  "(KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
              ),
          }
          probe_dir = Path(os.environ["PROBE_DIR"])
          cookie = os.environ["ROBLOX_CREATOR_COOKIE"]
          urls = [
              ("primary", os.environ.get("ROBLOX_CREATOR_OVERVIEW_URL", "").strip()),
              ("secondary", os.environ.get("ROBLOX_CREATOR_OVERVIEW_URL_2", "").strip()),
          ]
          for label, url in urls:
              if not url:
                  continue
              response = requests.get(
                  url,
                  headers=headers,
                  cookies={".ROBLOSECURITY": cookie},
                  timeout=30,
                  allow_redirects=True,
              )
              response.raise_for_status()
              project_id = url.rstrip("/").split("/")[-2]
              (probe_dir / f"{label}_{project_id}_overview.html").write_text(
                  response.text,
                  encoding="utf-8",
              )
              scripts = []
              for index, chunk in enumerate(response.text.split("<script")):
                  if index == 0:
                      continue
                  snippet = "<script" + chunk
                  lower_snippet = snippet.lower()
                  matched = [keyword for keyword in KEYWORDS if keyword in lower_snippet]
                  if not matched:
                      continue
                  scripts.append(
                      {
                          "index": index,
                          "matched_keywords": matched,
                          "content_excerpt": html.unescape(snippet)[:30000],
                      }
                  )
              (probe_dir / f"{label}_{project_id}_html_matches.json").write_text(
                  json.dumps(
                      {
                          "url": url,
                          "final_url": response.url,
                          "script_match_count": len(scripts),
                          "scripts": scripts,
                      },
                      ensure_ascii=False,
                      indent=2,
                  ),
                  encoding="utf-8",
              )
          PY

          ROBLOX_CREATOR_OVERVIEW_URL="$ROBLOX_CREATOR_OVERVIEW_URL" python scripts/discover_creator_metrics_with_playwright.py
          mv data/creator_metrics_network_debug.json "probe/primary_network_debug.json"
          mv data/creator_metrics_candidate_endpoints.json "probe/primary_candidate_endpoints.json"

          ROBLOX_CREATOR_OVERVIEW_URL="$ROBLOX_CREATOR_OVERVIEW_URL_2" python scripts/discover_creator_metrics_with_playwright.py
          mv data/creator_metrics_network_debug.json "probe/secondary_network_debug.json"
          mv data/creator_metrics_candidate_endpoints.json "probe/secondary_candidate_endpoints.json"

      - name: Upload probe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: creator-metrics-probe
          path: probe/

  sync:
    if: ${{ github.event.inputs.report_mode != 'creator_metrics_probe' }}
    runs-on: ubuntu-latest
    env:
      RUN_REPORT_MODE: ${{ github.event.inputs.report_mode || 'top100_message' }}
      RUN_TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || github.event_name }}
      RUN_TRIGGER_ACTOR: ${{ github.event.inputs.trigger_actor || github.actor }}
      RUN_CHAT_ID: ${{ github.event.inputs.chat_id || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run sync
        env:
          OUTPUT_DIR: ./data
          RETRY_MAX_ATTEMPTS: 3
          RETRY_BACKOFF_SECONDS: 2
          REQUEST_TIMEOUT_SECONDS: 15
          API_LIMIT: 100
          ROBLOX_SORT_ID: top-playing-now
          ROBLOX_TOP_TRENDING_SORT_ID: Top_Trending_V4
          ROBLOX_CREATOR_OVERVIEW_URL: ${{ vars.ROBLOX_CREATOR_OVERVIEW_URL }}
          ROBLOX_CREATOR_OVERVIEW_URL_2: ${{ vars.ROBLOX_CREATOR_OVERVIEW_URL_2 }}
          ROBLOX_CREATOR_COOKIE: ${{ secrets.ROBLOX_CREATOR_COOKIE }}
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_TIMEZONE: Asia/Shanghai
          FEISHU_TOP_TRENDING_SPREADSHEET_TOKEN: ${{ vars.FEISHU_TOP_TRENDING_SPREADSHEET_TOKEN }}
          FEISHU_TOP_TRENDING_SHEET_ID: ${{ vars.FEISHU_TOP_TRENDING_SHEET_ID }}
          FEISHU_UP_AND_COMING_SHEET_ID: ${{ vars.FEISHU_UP_AND_COMING_SHEET_ID }}
          FEISHU_TOP_PLAYING_NOW_SHEET_ID: ${{ vars.FEISHU_TOP_PLAYING_NOW_SHEET_ID }}
          FEISHU_TOP_TRENDING_PREV_RANKS: ${{ vars.FEISHU_TOP_TRENDING_PREV_RANKS }}
          FEISHU_UP_AND_COMING_PREV_RANKS: ${{ vars.FEISHU_UP_AND_COMING_PREV_RANKS }}
          FEISHU_TOP_PLAYING_NOW_PREV_RANKS: ${{ vars.FEISHU_TOP_PLAYING_NOW_PREV_RANKS }}
          FEISHU_TOP_TRENDING_SPREADSHEET_TITLE: ${{ vars.FEISHU_TOP_TRENDING_SPREADSHEET_TITLE }}
          FEISHU_TOP_TRENDING_TEST_SPREADSHEET_TOKEN: ${{ vars.FEISHU_TOP_TRENDING_TEST_SPREADSHEET_TOKEN }}
          FEISHU_TOP_TRENDING_TEST_SHEET_ID: ${{ vars.FEISHU_TOP_TRENDING_TEST_SHEET_ID }}
          FEISHU_UP_AND_COMING_TEST_SHEET_ID: ${{ vars.FEISHU_UP_AND_COMING_TEST_SHEET_ID }}
          FEISHU_TOP_PLAYING_NOW_TEST_SHEET_ID: ${{ vars.FEISHU_TOP_PLAYING_NOW_TEST_SHEET_ID }}
          FEISHU_TOP_TRENDING_TEST_PREV_RANKS: ${{ vars.FEISHU_TOP_TRENDING_TEST_PREV_RANKS }}
          FEISHU_UP_AND_COMING_TEST_PREV_RANKS: ${{ vars.FEISHU_UP_AND_COMING_TEST_PREV_RANKS }}
          FEISHU_TOP_PLAYING_NOW_TEST_PREV_RANKS: ${{ vars.FEISHU_TOP_PLAYING_NOW_TEST_PREV_RANKS }}
          FEISHU_TOP_TRENDING_TEST_SPREADSHEET_TITLE: ${{ vars.FEISHU_TOP_TRENDING_TEST_SPREADSHEET_TITLE }}
          FEISHU_PROJECT_METRICS_SPREADSHEET_TOKEN: ${{ vars.FEISHU_PROJECT_METRICS_SPREADSHEET_TOKEN }}
          FEISHU_PROJECT_METRICS_SHEET_ID: ${{ vars.FEISHU_PROJECT_METRICS_SHEET_ID }}
          FEISHU_PROJECT_METRICS_SPREADSHEET_TITLE: ${{ vars.FEISHU_PROJECT_METRICS_SPREADSHEET_TITLE }}
          FEISHU_PROJECT_METRICS_2_SPREADSHEET_TOKEN: ${{ vars.FEISHU_PROJECT_METRICS_2_SPREADSHEET_TOKEN }}
          FEISHU_PROJECT_METRICS_2_SHEET_ID: ${{ vars.FEISHU_PROJECT_METRICS_2_SHEET_ID }}
          FEISHU_PROJECT_METRICS_2_SPREADSHEET_TITLE: ${{ vars.FEISHU_PROJECT_METRICS_2_SPREADSHEET_TITLE }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          GITHUB_VARIABLES_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_REPORT_MODE: ${{ env.RUN_REPORT_MODE }}
          RUN_TRIGGER_SOURCE: ${{ env.RUN_TRIGGER_SOURCE }}
          RUN_TRIGGER_ACTOR: ${{ env.RUN_TRIGGER_ACTOR }}
          RUN_CHAT_ID: ${{ env.RUN_CHAT_ID }}
        run: python -m app.main

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roblox-top100-data
          path: data/

      - name: Upload project metrics artifacts
        if: always() && env.RUN_REPORT_MODE == 'roblox_project_daily_metrics'
        uses: actions/upload-artifact@v4
        with:
          name: project-metrics-data
          if-no-files-found: warn
          path: |
            data/project_metrics_*.json
            data/project_metrics_*.csv
            data/creator_overview_debug.json
